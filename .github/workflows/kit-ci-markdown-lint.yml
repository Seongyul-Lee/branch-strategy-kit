name: "Kit CI: Markdown Lint"

on:
  pull_request:
    paths:
      - "*.md"
      - ".github/*.md"

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            *.md
            .github/**/*.md
