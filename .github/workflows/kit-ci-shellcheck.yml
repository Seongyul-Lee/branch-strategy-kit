name: "Kit CI: ShellCheck"

on:
  pull_request:
    paths: ["scripts/*.sh"]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck (severity ≥ warning)
        run: |
          shellcheck --version
          shellcheck -S warning scripts/*.sh
