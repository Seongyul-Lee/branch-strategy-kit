name: "Kit CI: Bash Syntax"

on:
  pull_request:
    paths: ["scripts/*.sh"]

jobs:
  bash-syntax:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Check bash -n syntax
        shell: bash
        run: |
          failed=0
          for f in scripts/*.sh; do
            if bash -n "$f"; then
              echo "✅ $f"
            else
              echo "❌ $f"
              failed=1
            fi
          done
          exit $failed
